<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nwvbug</title>
    <link rel="shortcut icon" type="image/x-icon" href="/assets/nwvbug.png">
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Host+Grotesk:ital,wght@0,300..800;1,300..800&display=swap');
    body{
        background-color: black;
        color:white;
        font-family:"Host Grotesk", serif;
        padding:0;
        margin:0;
        overflow:hidden;
    }
    h1{
        font-size:50px;
    }
    .textcontainer{
        text-align: center;
        padding-right:50px;
        height:100vh;
        display:flex;
        flex-direction: column;
        justify-content: space-evenly;
    }
    img{
        height:50px;
        transition: 0.5s;
    }
    img:hover{
        opacity:1;
        transform: rotate(90deg) scale(0.5);
    }
    .linksholder{
        display:flex;
        flex-direction: column;
        justify-content: center;
        gap:20px;
    }
    .linksholder div{
        font-size: 25px;
        font-weight: 200;
        letter-spacing: normal;
        transition: 0.5s;
        cursor:pointer;
    }
    .linksholder div:hover{
        letter-spacing: 5px;
        font-weight:600;
    }
    a{
        color:white;
        text-decoration: none;
    }


    .header{
        display:flex;
        justify-content: center;
        align-items: center;
        gap:20px;
    }


    @media(max-width:1000px){
        .header{
            flex-direction: column;
            gap:10px;
        }
        .textcontainer{
            z-index:2;
            position:absolute;
            top:0;
            bottom:0;
            left:0;
            right:0;
            padding:10px;
            width:100vw;
            text-align: center;
            height:100vh;
            display:flex;
            flex-direction: column;
            justify-content: space-evenly;
        }
        h1{
            font-size:30px;
        }
    }
</style>
<body>
    <div class="textcontainer">
        <div class="header">
            <img src="https://nwvbug.com/assets/nwvbugnobackground.png">
            <h1>Making things I think are interesting.</h1>
        </div>
        
        <div class="linksholder">
            <div><a href="https://ytm.nwvbug.com">YouTube Music Beautifier</a></div>
            <div><a href="https://github.com/nwvbug/parallelnotes">Parallel Notes</a></div>
            <div><a href="https://github.com/nwvbug">My GitHub</a></div>
        </div>
        
    </div>
</body>
</html>
